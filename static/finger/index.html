<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Finger Bend Experiment</title>
  <link rel="stylesheet" href="css/finger.css">
</head>
<body>
  <div id="instructions-screen" class="screen">
    <h1>Welcome to the Finger Experiment</h1>
    <p>Watch each hand video. A brief color cue at the beginning marks the control or bend group.</p>
    <button id="start-button">Start</button>
  </div>

  <div id="experiment-area" class="container hidden">
    <video id="stimulus-video" muted playsinline preload="auto">
      Your browser does not support the video tag.
    </video>
    <div id="cue-display" class="cue-overlay hidden">
      <div id="cue-shape" class="cue-element"></div>
    </div>
  </div>

  <div id="trial-info" class="screen">
    <p>Trial: <span id="trial-counter">0</span>/<span id="total-trials-display">0</span></p>
  </div>

  <div id="feedback-area" class="screen">
    <p id="feedback-text"></p>
  </div>

  <div id="end-screen" class="screen hidden">
    <h1>Experiment Finished!</h1>
    <p>Thank you for your participation.</p>
  </div>

  <div id="corner-square-element" class="corner-square-element"></div>

  <script src="../js/utils.js"></script>
  <script src="./js/finger.js"></script>
</body>
</html>
